name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check linting
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install XFOIL and Xvfb
        run: sudo apt-get update && sudo apt-get install -y xfoil xvfb

      - name: Verify XFOIL works in batch mode
        run: |
          echo -e "PLOP\nG\n\nNACA 2412\nOPER\nPACC\ntest_output.dat\ntest_dump.dat\nALFA 5.0\n\nQUIT\n" | xvfb-run xfoil || true
          echo "=== XFOIL output file ==="
          cat test_output.dat 2>/dev/null || echo "No output file created"
          echo "=== Done ==="

      - name: Install package and dev dependencies
        run: pip install ".[dev]"

      - name: Run tests
        env:
          XFOIL_PATH: /usr/bin/xfoil
        run: xvfb-run pytest tests/ -v

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
